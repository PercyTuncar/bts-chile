      - generic [ref=e444]:
        - generic [ref=e445]:
          - 'heading "Entradas BTS Chile 2026: BTS en Santiago en el Estadio Nacional" [level=2] [ref=e446]'
          - generic [ref=e447]:
            - paragraph [ref=e448]: El ARMY chileno tiene una cita imperdible. El BTS World Tour ARIRANG 2026 aterriza en Santiago con tres fechas en el mítico Estadio Nacional Julio Martínez Prádanos, en la comuna de Ñuñoa. Si estás buscando entradas BTS Chile 2026 para ver en vivo a RM, Jin, Suga, J-Hope, Jimin, V y Jung Kook, aquí tienes toda la información sobre el recinto, el transporte y cómo prepararte para el gran día.
            - paragraph [ref=e449]: BTS, la banda surcoreana surgida de BigHit Music (hoy HYBE), vuelve a Latinoamérica con un espectáculo que promete emocionar a uno de los fandoms más fieles del continente. Chile, que ya ha recibido a la banda en el pasado, se prepara para tres noches inolvidables.
        - region [ref=e450]:
          - 'heading "El Estadio Nacional: el Coloso de Ñuñoa" [level=3] [ref=e451]'
          - generic [ref=e452]:
            - paragraph [ref=e453]: El Estadio Nacional Julio Martínez Prádanos, conocido cariñosamente como el "Coloso de Ñuñoa", es el principal recinto deportivo de Chile. Se ubica dentro del Parque Deportivo Estadio Nacional, un complejo de cerca de 64 hectáreas en la comuna de Ñuñoa, en Av. Grecia 2001, Santiago. Es el estadio más grande del país, con una capacidad oficial de aproximadamente 48.665 espectadores en su configuración deportiva.
            - paragraph [ref=e454]: Además de ser la casa de la Roja, el Estadio Nacional es el gran escenario de los conciertos masivos en Chile, habiendo recibido a numerosos artistas internacionales de primer nivel. Su ubicación central y su excelente conexión de transporte lo convierten en el lugar ideal para un evento de la magnitud del BTS ARIRANG 2026 en Santiago.
        - region [ref=e455]:
          - heading "Cómo llegar al Estadio Nacional en Metro" [level=3] [ref=e456]
          - paragraph [ref=e457]: Una de las grandes ventajas del recinto es que cuenta con su propia estación de Metro, diseñada para grandes flujos de personas.
          - list [ref=e458]:
            - listitem [ref=e459]:
              - strong [ref=e460]: "Metro Línea 6 (morada):"
              - text: la estación Estadio Nacional te deja prácticamente en la puerta del recinto. Se ubica en la Av. Pedro de Valdivia a la altura de Av. Grecia, con salidas directas hacia el estadio. Es la opción más cómoda y rápida.
            - listitem [ref=e461]:
              - strong [ref=e462]: "Metro Línea 3:"
              - text: puedes usar la Línea 3 y combinar hacia la Línea 6 para acercarte al sector de Ñuñoa. La red de Metro de Santiago está muy interconectada, lo que facilita el acceso desde casi cualquier punto de la ciudad.
            - listitem [ref=e463]:
              - strong [ref=e464]: "Combinaciones útiles:"
              - text: la Línea 6 conecta con la Línea 1 en Los Leones, con la Línea 3 en Ñuñoa y con la Línea 5 en Ñuble, entre otras. Desde el centro, una ruta recomendada es tomar la Línea 5 y cambiar a la Línea 6 en Ñuble.
          - paragraph [ref=e465]: También hay recorridos de buses de la Red Metropolitana de Movilidad que circulan por Av. Grecia y Av. Pedro de Valdivia. Si vienes en auto, considera que el estacionamiento es limitado y las calles del entorno se saturan; el Metro sigue siendo la mejor alternativa.
        - region [ref=e466]:
          - heading "El entorno y la ciudad de Santiago" [level=3] [ref=e467]
          - paragraph [ref=e468]: Ñuñoa es una de las comunas más queridas de Santiago, con ambiente residencial, plazas, cafés y una vida cultural activa. Alrededor del estadio encontrarás el Museo Patrimonial del Estadio Nacional, el velódromo y otras instalaciones deportivas. Santiago, la capital chilena rodeada por la cordillera de los Andes, ofrece atractivos como el cerro San Cristóbal, el barrio Lastarria y el barrio Bellavista, ideales para complementar tu visita.
        - region [ref=e469]:
          - heading "Fechas del BTS ARIRANG 2026 en Santiago" [level=3] [ref=e470]
          - paragraph [ref=e471]: "El BTS en Santiago tendrá tres fechas confirmadas en el Estadio Nacional:"
          - list [ref=e472]:
            - listitem [ref=e473]:
              - time [ref=e474]: Miércoles 14 de octubre de 2026
            - listitem [ref=e475]:
              - time [ref=e476]: Viernes 16 de octubre de 2026
            - listitem [ref=e477]:
              - time [ref=e478]: Sábado 17 de octubre de 2026
          - paragraph [ref=e479]: Sobre las canciones, el ARMY sueña con escuchar clásicos como "Idol", "Boy With Luv", "Dynamite" o "Spring Day", junto a posibles interpretaciones en solitario. Conviene recordar que el setlist definitivo no ha sido oficializado por HYBE, así que todo lo que se comenta al respecto pertenece al terreno de la expectativa y el rumor, parte natural de la ilusión antes de la gira.
        - region [ref=e480]:
          - heading "Consejos para asistir al concierto" [level=3] [ref=e481]
          - list [ref=e482]:
            - listitem [ref=e483]:
              - strong [ref=e484]: "Llega con anticipación:"
              - text: las puertas abren varias horas antes del show. Llegar temprano facilita el ingreso y te da tiempo para ubicarte tranquilo.
            - listitem [ref=e485]:
              - strong [ref=e486]: "Qué llevar:"
              - text: tu entrada, carnet de identidad, agua, una casaca ligera (octubre en Santiago tiene noches frescas) y tu ARMY Bomb para sumarte al mar de luces.
            - listitem [ref=e487]:
              - strong [ref=e488]: "Comunidad ARMY:"
              - text: el fandom chileno es reconocido por su organización y calidez. Son habituales los proyectos de fans, el intercambio de "photocards" y las coreografías coordinadas por tribuna.
            - listitem [ref=e489]:
              - strong [ref=e490]: "Seguridad:"
              - text: cuida tus pertenencias y sigue las indicaciones del personal para disfrutar de una jornada segura.
          - paragraph [ref=e491]: Ver a BTS en Chile en el Estadio Nacional será un recuerdo para toda la vida. Organiza tu ruta en Metro Línea 6, prepara tu ARMY Bomb y vive el BTS World Tour ARIRANG 2026 en Santiago junto a miles de fans.
